<?xml version="1.0" encoding="UTF-8"?>
<!-- isiko favicon · adaptive (dark ring on light mode, light ring on dark mode) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .ring { stroke: #0A0A0A; }
    @media (prefers-color-scheme: dark) {
      .ring { stroke: #FFFFFF; }
    }
  </style>
  <circle class="ring" cx="50" cy="50" r="42" fill="none" stroke-width="5"/>
  <circle cx="50" cy="50" r="28" fill="#C7F05A"/>
</svg>
